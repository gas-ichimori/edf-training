<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EDF訓練① ランナー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  font-family: 'M PLUS 1p', sans-serif;
  font-weight: 800;
  background: #07100a;
  color: #dff0d0;
  overflow: hidden;
  touch-action: none;
}

/* ===== TOP SCREEN ===== */
#top-screen {
  position: fixed; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  z-index: 10;
}
#top-bg {
  position: absolute; inset: 0;
  background: url('/top_bg.png') center center / cover no-repeat;
  z-index: 0;
}
#top-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
}
#top-screen > *:not(#top-bg) { position: relative; z-index: 1; }

#logo-switcher {
  position: relative;
  width: 200px; height: 80px;
}
#logo-switcher img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.6s ease;
  filter: drop-shadow(0 2px 16px rgba(0,0,0,0.8));
}
#logo-switcher img.active { opacity: 1; }

#top-title {
  text-align: center;
}
#top-title h1 {
  font-size: 42px; letter-spacing: 6px; color: #c8a832;
  text-shadow: 0 2px 20px rgba(0,0,0,0.9);
  line-height: 1.2;
}
#top-title .sub-en {
  display: block; margin-top: 8px;
  font-size: 13px; letter-spacing: 4px; color: rgba(200,168,50,0.8);
}

.top-desc {
  text-align: center;
  font-size: 18px; letter-spacing: 3px; color: #dff0d0;
  text-shadow: 0 1px 10px rgba(0,0,0,0.9);
  line-height: 1.8;
}
.top-desc-en {
  display: block; margin-top: 8px;
  font-size: 11px; letter-spacing: 3px; color: rgba(200,168,50,0.8);
  line-height: 1.8;
}

#start-btn {
  background: none; border: none; cursor: pointer;
  padding: 0;
  filter: drop-shadow(0 0 16px rgba(136,255,85,0.6));
  transition: transform 0.15s, filter 0.15s;
}
#start-btn img { width: 110px; height: 110px; object-fit: contain; }
@keyframes btn-launch {
  0%   { transform: scale(1); }
  25%  { transform: scale(0.82); }
  60%  { transform: scale(1.18); }
  80%  { transform: scale(0.96); }
  100% { transform: scale(1); }
}
#start-btn.launching {
  animation: btn-launch 0.45s ease forwards;
  pointer-events: none;
}

#top-copyright {
  position: absolute; bottom: 10px; left: 0; right: 0;
  text-align: center;
  font-size: 8px; letter-spacing: 3px;
  color: rgba(200,240,160,0.6);
}

/* ===== GAME SCREEN ===== */
#game-screen {
  position: fixed; inset: 0;
  display: none;
}
#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}

/* HUD */
#hud {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 14px 20px;
  pointer-events: none;
  z-index: 2;
}
#hud-score {
  font-size: 22px; letter-spacing: 4px; color: #88ff55;
  text-shadow: 0 0 12px rgba(136,255,85,0.6);
}
#hud-time {
  font-size: 22px; letter-spacing: 4px; color: #c8a832;
  text-shadow: 0 0 12px rgba(200,168,50,0.6);
}

/* WAVE ALERT */
#wave-alert {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px; letter-spacing: 6px; color: #ff4444;
  text-shadow: 0 0 20px rgba(255,60,60,0.8);
  text-align: center;
  pointer-events: none;
  z-index: 3;
  opacity: 0;
  transition: opacity 0.3s;
}
#wave-alert.show { opacity: 1; }

/* ===== GAME OVER SCREEN ===== */
#gameover-screen {
  position: fixed; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  background: url('/bg.png') center center / cover no-repeat;
  z-index: 20;
}
#gameover-screen::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.48);
  z-index: 0;
}
/* 指揮官は絶対配置で画面下に固定（テキスト・ボタンの後ろ） */
#go-commander {
  position: absolute !important;
  bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  z-index: 1 !important;
}
#go-commander img {
  max-height: 82vh;
  max-width: 95vw;
  object-fit: contain;
  filter: drop-shadow(0 4px 32px rgba(0,0,0,0.7));
}
/* テキスト・フッターは指揮官の上に重なる */
#go-message {
  position: relative; z-index: 2;
  padding: 16px 30px 0;
  text-align: center;
  font-size: 20px; letter-spacing: 3px; color: #dff0d0;
  line-height: 1.8;
  text-shadow: 0 1px 12px rgba(0,0,0,1), 0 0 4px rgba(0,0,0,1);
  min-height: 80px;
}
#go-footer {
  position: relative; z-index: 2;
  width: 100%;
  padding: 14px 30px 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
#go-score-text {
  font-size: 16px; letter-spacing: 4px; color: #c8a832;
  text-shadow: 0 0 10px rgba(200,168,50,0.5), 0 1px 6px rgba(0,0,0,1);
}
.go-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  position: relative;
  transition: transform 0.1s;
  display: block;
}
@keyframes go-btn-press {
  0%   { transform: scale(1); }
  30%  { transform: scale(0.86); }
  65%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes go-btn-glow-green {
  0%,100% { filter: drop-shadow(0 0 6px rgba(136,255,85,0.5)); }
  50%     { filter: drop-shadow(0 0 22px rgba(136,255,85,1)); }
}
@keyframes go-btn-glow-gold {
  0%,100% { filter: drop-shadow(0 0 6px rgba(200,168,50,0.5)); }
  50%     { filter: drop-shadow(0 0 22px rgba(200,168,50,1)); }
}
.go-btn.pressing { animation: go-btn-press 0.32s ease forwards; }
#btn-volunteer.attention { animation: go-btn-glow-green 0.4s ease 3; }
#btn-share.attention     { animation: go-btn-glow-gold  0.4s ease 3; }
.go-btn img { display: block; width: 280px; }
.go-btn-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  white-space: nowrap;
  font-family: 'M PLUS 1p', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 3px;
  pointer-events: none;
}
#btn-volunteer .go-btn-text {
  color: #dff0d0;
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
}
#btn-share .go-btn-text {
  color: #f0e0a0;
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
}
#go-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  align-items: center;
}
.go-result-btn {
  font-family: 'M PLUS 1p', sans-serif; font-weight: 800;
  font-size: 15px; letter-spacing: 3px;
  padding: 16px; border-radius: 6px; cursor: pointer;
  width: 100%;
  transition: transform 0.1s;
}
.go-result-btn:active { transform: scale(0.97); }
.go-result-btn.pressing { animation: go-btn-press 0.32s ease forwards; }
#btn-share.go-result-btn {
  background: rgba(136,255,85,0.15);
  border: 2px solid rgba(136,255,85,0.7);
  color: #88ff55;
}
#btn-retry.go-result-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  color: #aaa;
}
#btn-hub.go-result-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: #666;
}
/* YES/NO確認ダイアログ */
#go-nav-confirm {
  position: absolute !important;
  top: 0; left: 0; right: 0;
  padding: 28px 24px 22px;
  background: rgba(0,4,0,0.94);
  border-bottom: 2px solid rgba(136,255,85,0.6);
  text-align: center;
  z-index: 5 !important;
  display: none;
}
#go-nav-confirm p {
  font-size: 15px; letter-spacing: 2px; color: #dff0d0;
  line-height: 1.8; margin-bottom: 18px;
}
#go-yesno {
  display: flex; gap: 24px; justify-content: center;
}
.go-yn-btn {
  font-family: 'M PLUS 1p', sans-serif; font-weight: 800;
  font-size: 22px; letter-spacing: 8px;
  padding: 12px 38px; border-radius: 6px;
  cursor: pointer; transition: transform 0.1s;
}
.go-yn-btn:active { transform: scale(0.90); }
.go-yn-btn.pressing { animation: go-btn-press 0.32s ease forwards; }
#btn-yes {
  background: rgba(136,255,85,0.12);
  border: 2px solid rgba(136,255,85,0.8);
  color: #88ff55;
  text-shadow: 0 0 10px rgba(136,255,85,0.5);
}
#btn-no {
  background: rgba(255,80,80,0.1);
  border: 2px solid rgba(255,80,80,0.7);
  color: #ff6666;
  text-shadow: 0 0 10px rgba(255,80,80,0.5);
}
</style>
</head>
<body>

<!-- TOP SCREEN -->
<div id="top-screen">
  <div id="top-bg"></div>

  <div id="logo-switcher">
    <img src="/logo3.png" alt="EDF 5" class="active">
    <img src="/logo2.png" alt="EDF 6">
    <img src="/logo1.png" alt="EDF 6.1">
  </div>

  <div id="top-title">
    <h1>突破せよ！EDF！</h1>
    <span class="sub-en">BREAK THROUGH! EDF!</span>
  </div>

  <div class="top-desc">
    <p>訓練① ランナー</p>
    <p>タップでジャンプ</p>
    <span class="top-desc-en">AVOID THE ANTS — TAP TO JUMP</span>
  </div>

  <button id="start-btn" aria-label="ゲームスタート">
    <img src="/mark.png" alt="START">
  </button>

  <p id="top-copyright">© D3PUBLISHER INC. All rights reserved.</p>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <canvas id="game-canvas"></canvas>
  <div id="hud">
    <span id="hud-score">SCORE: 0</span>
    <span id="hud-time">00:00</span>
  </div>
  <div id="wave-alert">⚠ 大群接近 ⚠<br><span style="font-size:18px;letter-spacing:3px">MASSIVE WAVE INCOMING</span></div>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameover-screen">
  <div id="go-commander">
    <img src="/taisa.png" alt="大佐" id="go-commander-img">
  </div>
  <div id="go-message"></div>
  <div id="go-footer">
    <div id="go-score-text"></div>
    <div id="go-btns">
      <button class="go-btn go-result-btn" id="btn-share">仲間を呼ぶ【シェア】</button>
      <button class="go-btn go-result-btn" id="btn-retry">もう一度訓練する</button>
      <button class="go-btn go-result-btn" id="btn-hub">訓練ハブに戻る</button>
    </div>
  </div>
</div>

<script>
// ===== AUDIO =====
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playStartSound() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(220, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, ac.currentTime + 0.18);
    gain.gain.setValueAtTime(0.25, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
    osc.start(); osc.stop(ac.currentTime + 0.25);
  } catch(e) {}
}
function playJumpSound() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(280, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(560, ac.currentTime + 0.09);
    gain.gain.setValueAtTime(0.38, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.14);
    osc.start(); osc.stop(ac.currentTime + 0.14);
  } catch(e) {}
}
function playVolunteerSound() {
  try {
    const ac = getAudio();
    // 上昇するファンファーレ3音
    [330, 440, 550].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.value = freq;
      const t = ac.currentTime + i * 0.1;
      gain.gain.setValueAtTime(0.0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      osc.start(t); osc.stop(t + 0.14);
    });
  } catch(e) {}
}
function playTypeClick() {
  try {
    const ac = getAudio();
    const buf = ac.createBuffer(1, 256, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < 256; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 30);
    const src = ac.createBufferSource();
    const gain = ac.createGain();
    src.buffer = buf; src.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.07, ac.currentTime);
    src.start();
  } catch(e) {}
}
function playWaveAlertSound() {
  try {
    const ac = getAudio();
    // サイレン風：低→高→低を素早く繰り返す2サイクル
    [0, 0.22].forEach(offset => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, ac.currentTime + offset);
      osc.frequency.linearRampToValueAtTime(700, ac.currentTime + offset + 0.18);
      osc.frequency.linearRampToValueAtTime(300, ac.currentTime + offset + 0.36);
      gain.gain.setValueAtTime(0.28, ac.currentTime + offset);
      gain.gain.setValueAtTime(0.28, ac.currentTime + offset + 0.30);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + offset + 0.40);
      osc.start(ac.currentTime + offset);
      osc.stop(ac.currentTime + offset + 0.40);
    });
  } catch(e) {}
}
function playYesSound() {
  try {
    const ac = getAudio();
    [440, 660].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.value = freq;
      const t = ac.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0.0, t);
      gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
    });
  } catch(e) {}
}
function playNoSound() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(360, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(160, ac.currentTime + 0.22);
    gain.gain.setValueAtTime(0.2, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.24);
    osc.start(); osc.stop(ac.currentTime + 0.24);
  } catch(e) {}
}
function playShareSound() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(900, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(500, ac.currentTime + 0.15);
    osc.frequency.exponentialRampToValueAtTime(750, ac.currentTime + 0.28);
    gain.gain.setValueAtTime(0.2, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.32);
    osc.start(); osc.stop(ac.currentTime + 0.32);
  } catch(e) {}
}

// ===== ASSET LOADING =====
const ASSETS = {};
const ASSET_LIST = [
  ['bg',         '/bg.png'],
  ['ground',     '/ground.png'],
  ['effect',     '/effect.png'],
  ['sol_run1',   '/sol_run1.png'],
  ['sol_run2',   '/sol_run2.png'],
  ['sol_run3',   '/sol_run3.png'],
  ['sol_run4',   '/sol_run4.png'],
  ['sol_run5',   '/sol_run5.png'],
  ['sol_run6',   '/sol_run6.png'],
  ['sol_jump',   '/sol_jump.png'],
  ['ant1',       '/ant1.png'],
  ['ant2',       '/ant2.png'],
  ['ant3',       '/ant3.png'],
  ['ant4',       '/ant4.png'],
  ['crush',      '/crush.png'],
  ['taisa',      '/taisa.png'],
];

function loadAssets() {
  return Promise.all(ASSET_LIST.map(([key, src]) => new Promise((res) => {
    const img = new Image();
    img.onload = () => { ASSETS[key] = img; res(); };
    img.onerror = () => { ASSETS[key] = null; res(); };
    img.src = src;
  })));
}

// ===== LOGO SWITCHER =====
(function() {
  const logos = document.querySelectorAll('#logo-switcher img');
  let current = 0;
  setInterval(() => {
    logos[current].classList.remove('active');
    current = (current + 1) % logos.length;
    logos[current].classList.add('active');
  }, 2000);
})();

// ===== GAME CONSTANTS =====
const GROUND_RATIO   = 0.87;  // canvas height ratio where ground surface is
const SOL_X_RATIO    = 0.18;  // soldier fixed X position ratio
const SOL_WIDTH      = 90;
const SOL_HEIGHT     = 140;
const ANT_WIDTH      = 80;
const ANT_HEIGHT     = 60;
const GRAVITY        = 1300;  // px/s²
const JUMP_VY        = -780;  // px/s
const SCROLL_SPEED_INIT = 320; // px/s
const SCROLL_ACCEL   = 8;     // px/s per second
const ANT_SPAWN_MIN  = 1.4;   // seconds
const ANT_SPAWN_MAX  = 2.8;
const ANT_FRAME_MS   = 130;
const SOL_FRAME_MS   = 80;

// ===== GAME STATE =====
let canvas, ctx, W, H, groundY;
let gameRunning = false;
let gameOver    = false;
let startTime, elapsed, score;
let scrollSpeed;
let bgX1, bgX2, bgW;
let groundX1, groundX2;
let soldier, ants, effects;
let nextAntSpawn;
let antFrameIdx, antFrameTimer;
let solFrameIdx, solFrameTimer;
let animId;

function $ (id) { return document.getElementById(id); }

// ===== RESIZE =====
function resize() {
  const newW = window.innerWidth;
  const newH = window.innerHeight;
  if (W === newW && H === newH) return;
  W = canvas.width  = newW;
  H = canvas.height = newH;
  groundY = H * GROUND_RATIO;
  // background width based on image aspect ratio
  const bgImg = ASSETS['bg'];
  bgW = bgImg ? H * (bgImg.naturalWidth / bgImg.naturalHeight) : W;
}

// ===== INIT GAME =====
function initGame() {
  resize();

  startTime    = performance.now();
  elapsed      = 0;
  score        = 0;
  scrollSpeed  = SCROLL_SPEED_INIT;
  bgX1         = 0;
  bgX2         = bgW;
  groundX1     = 0;
  groundX2     = W;
  antFrameIdx  = 0;
  antFrameTimer= 0;
  solFrameIdx  = 0;
  solFrameTimer= 0;
  gameRunning  = true;
  gameOver     = false;

  soldier = {
    x: W * SOL_X_RATIO,
    y: groundY - SOL_HEIGHT,
    vy: 0,
    onGround: true,
    dead: false,
    effectTimer: 0,
  };

  ants    = [];
  effects = [];

  scheduleNextAnt();
  updateHUD();
}

function scheduleNextAnt() {
  nextAntSpawn = performance.now() + (ANT_SPAWN_MIN + Math.random() * (ANT_SPAWN_MAX - ANT_SPAWN_MIN)) * 1000;
}

// ===== JUMP =====
function jump() {
  if (!gameRunning || gameOver) return;
  if (soldier.onGround) {
    soldier.vy = JUMP_VY;
    soldier.onGround = false;
    playJumpSound();
  }
}

// ===== UPDATE =====
let lastTime = 0;
function update(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  // always update effects (needed for game over explosion animation)
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].timer -= dt * 1000;
    if (effects[i].timer <= 0) effects.splice(i, 1);
  }

  if (!gameRunning || gameOver) return;

  elapsed = (now - startTime) / 1000;
  score   = Math.floor(elapsed * 10);

  // speed ramp
  scrollSpeed = SCROLL_SPEED_INIT + elapsed * SCROLL_ACCEL;

  // scroll background
  const dx = scrollSpeed * dt;
  bgX1 -= dx * 0.6;
  bgX2 -= dx * 0.6;
  if (bgX1 + bgW <= 0) bgX1 = bgX2 + bgW;
  if (bgX2 + bgW <= 0) bgX2 = bgX1 + bgW;

  groundX1 -= dx;
  groundX2 -= dx;
  if (groundX1 + W <= 0) groundX1 = groundX2 + W;
  if (groundX2 + W <= 0) groundX2 = groundX1 + W;

  // soldier physics
  if (!soldier.onGround) {
    soldier.vy += GRAVITY * dt;
    soldier.y  += soldier.vy * dt;
    if (soldier.y >= groundY - SOL_HEIGHT) {
      soldier.y  = groundY - SOL_HEIGHT;
      soldier.vy = 0;
      soldier.onGround = true;
    }
  }

  // soldier frame
  solFrameTimer += dt * 1000;
  if (solFrameTimer >= SOL_FRAME_MS) {
    solFrameTimer = 0;
    if (soldier.onGround) solFrameIdx = (solFrameIdx + 1) % 6;
  }

  // ant frame
  antFrameTimer += dt * 1000;
  if (antFrameTimer >= ANT_FRAME_MS) {
    antFrameTimer = 0;
    antFrameIdx = (antFrameIdx + 1) % 4;
  }

  // ant spawn
  if (now >= nextAntSpawn) {
    spawnAnt();
    scheduleNextAnt();
  }

  // update ants
  for (let i = ants.length - 1; i >= 0; i--) {
    const a = ants[i];
    a.x -= scrollSpeed * dt * (a.speedMul || 1);
    if (a.x + ANT_WIDTH < 0) {
      ants.splice(i, 1);
      continue;
    }
    // collision
    if (!soldier.dead && !gameOver && !a.crushed) {
      const sx = soldier.x + 10, sy = soldier.y + 10;
      const sw = SOL_WIDTH - 20, sh = SOL_HEIGHT - 10;
      const ax = a.x + 8,        ay = a.y + 8;
      const aw = ANT_WIDTH - 16, ah = ANT_HEIGHT - 8;
      if (sx < ax + aw && sx + sw > ax && sy < ay + ah && sy + sh > ay) {
        // 上から踏み潰し判定: 落下中かつ兵士の足元が蟻の上半分に接触
        const stomping = !soldier.onGround && soldier.vy > 0 && (sy + sh) <= ay + ah * 0.55;
        if (stomping) {
          a.crushed = true;
          a.crushTimer = 400;
          soldier.vy = JUMP_VY * 0.55; // 小さくバウンス
          soldier.onGround = false;
          effects.push({ x: a.x, y: a.y, timer: 400, crush: true });
        } else {
          triggerGameOver();
          return;
        }
      }
    }
  }

  updateHUD();
}

function spawnAnt() {
  ants.push({
    x: W + 20,
    y: groundY - ANT_HEIGHT,
    speedMul: 1,
  });
}

function spawnWave() {
  const MAX_H  = 11;           // 中央の最大積み上げ段数
  const COLS   = 17;           // 横方向の列数
  const CENTER = Math.floor(COLS / 2);
  const GAP_X  = ANT_WIDTH * 0.78;  // 列間隔

  for (let col = 0; col < COLS; col++) {
    const dist   = Math.abs(col - CENTER);
    const height = Math.max(2, MAX_H - dist);
    for (let row = 0; row < height; row++) {
      ants.push({
        x: W + 20 + col * GAP_X,
        y: Math.max(-ANT_HEIGHT, groundY - ANT_HEIGHT * (row + 1)),
        speedMul: 1.3,
      });
    }
  }
}


function triggerGameOver() {
  gameOver    = true;
  gameRunning = false;

  effects.push({ x: soldier.x, y: soldier.y - 10, timer: 800 });

  setTimeout(() => {
    cancelAnimationFrame(animId);
    $('game-screen').style.display = 'none';
    showGameOverScreen();
  }, 2800);
}

// ===== DRAW =====
function draw() {
  ctx.clearRect(0, 0, W, H);

  // background (maintain aspect ratio, tile horizontally)
  const bg = ASSETS['bg'];
  if (bg) {
    ctx.drawImage(bg, bgX1, 0, bgW, H);
    ctx.drawImage(bg, bgX2, 0, bgW, H);
  } else {
    ctx.fillStyle = '#0a1a0f';
    ctx.fillRect(0, 0, W, H);
  }

  // ground strip
  const gr = ASSETS['ground'];
  if (gr) {
    const gh = H - groundY + 20;
    ctx.drawImage(gr, groundX1, groundY - 10, W, gh);
    ctx.drawImage(gr, groundX2, groundY - 10, W, gh);
  } else {
    ctx.fillStyle = '#1a3a0a';
    ctx.fillRect(0, groundY, W, H - groundY);
  }

  // ants (green glow)
  const antImg = ASSETS[`ant${antFrameIdx + 1}`];
  if (antImg) {
    ctx.shadowBlur = 14;
    ctx.shadowColor = '#44ff44';
    for (const a of ants) {
      ctx.drawImage(antImg, a.x, a.y, ANT_WIDTH, ANT_HEIGHT);
    }
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
  }

  // soldier
  if (!gameOver) {
    let solImg;
    if (soldier.onGround) {
      solImg = ASSETS[`sol_run${solFrameIdx + 1}`];
    } else {
      solImg = ASSETS['sol_jump'];
    }
    if (solImg) {
      ctx.drawImage(solImg, soldier.x, soldier.y, SOL_WIDTH, SOL_HEIGHT);
    }
  }

  // effects
  const effImg   = ASSETS['effect'];
  const crushImg = ASSETS['crush'];
  for (const ef of effects) {
    const alpha = Math.min(ef.timer / 400, 1);
    ctx.globalAlpha = alpha;
    if (ef.crush && crushImg) {
      ctx.drawImage(crushImg, ef.x, ef.y, ANT_WIDTH, ANT_HEIGHT);
    } else if (effImg) {
      ctx.drawImage(effImg, ef.x - 20, ef.y - 20, SOL_WIDTH + 40, SOL_HEIGHT + 40);
    }
    ctx.globalAlpha = 1;
  }
}

// ===== GAME LOOP =====
function gameLoop(now) {
  update(now);
  draw();
  animId = requestAnimationFrame(gameLoop);
}

// ===== HUD =====
function updateHUD() {
  $('hud-score').textContent = `SCORE: ${score}`;
  const sec = Math.floor(elapsed);
  const mm  = String(Math.floor(sec / 60)).padStart(2, '0');
  const ss  = String(sec % 60).padStart(2, '0');
  $('hud-time').textContent = `${mm}:${ss}`;
}

// ===== GAME OVER SCREEN =====
const GO_MESSAGES = [
  { text: 'こんなコトも出来ないのか！\n知人・友人にも広めて鍛えておけ！',
    speech: 'こんなことも出来ないのか！ちじん・ゆうじんにも広めて、きたえておけ！' },
  { text: 'こんなコトも出来ないのか！\n貴様ら、もっと鍛え直せ！',
    speech: 'こんなことも出来ないのか！きさまら、もっときたえなおせ！' },
  { text: 'まだまだだな…\n仲間を呼んで鍛えてこい！',
    speech: 'まだまだだな・・・なかまをよんで、きたえてこい！' },
];

function showGameOverScreen() {
  const msgObj = GO_MESSAGES[Math.floor(Math.random() * GO_MESSAGES.length)];
  $('go-message').textContent = '';
  $('go-score-text').textContent = `SCORE: ${score} — SURVIVAL: ${Math.floor(elapsed)}s`;
  $('gameover-screen').style.display = 'flex';

  const speechText = msgObj.speech || msgObj.text.replace(/\n/g, '。');
  typeMessage(msgObj.text, () => {
    speakMessage(speechText);
  });
}

function typeMessage(text, onDone) {
  const el = $('go-message');
  el.textContent = '';
  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      const ch = text[i++];
      el.textContent += ch;
      if (ch !== '\n' && ch !== ' ') playTypeClick();
    } else {
      clearInterval(interval);
      if (onDone) onDone();
    }
  }, 60);
}

function speakMessage(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.9;
  utter.pitch = 0.75;
  window.speechSynthesis.speak(utter);
}
function speakAndThen(text, callback) {
  if (!window.speechSynthesis) { setTimeout(callback, 2000); return; }
  let called = false;
  function proceed() { if (called) return; called = true; callback(); }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP'; utter.rate = 0.95; utter.pitch = 1.1;
  utter.onend = () => setTimeout(proceed, 800);
  utter.onerror = () => setTimeout(proceed, 300);
  // iOS Safari で onend が発火しない場合のフォールバック
  setTimeout(proceed, Math.max(2500, text.length * 220));
  window.speechSynthesis.speak(utter);
}

// ===== INPUT =====
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') jump();
});

// ===== START =====
function onStartPress() {
  const btn = $('start-btn');
  if (btn.classList.contains('launching')) return;
  btn.classList.add('launching');
  // iOS Safari: ユーザー操作の文脈でSpeech Synthesisを解禁
  if (window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance('');
    window.speechSynthesis.speak(u);
  }
  playStartSound();
  setTimeout(startGame, 480);
}
$('start-btn').addEventListener('click', onStartPress);
$('start-btn').addEventListener('touchend', (e) => { e.preventDefault(); onStartPress(); });

function startGame() {
  $('top-screen').style.display = 'none';
  $('game-screen').style.display = 'block';
  canvas = $('game-canvas');
  ctx    = canvas.getContext('2d');

  canvas.addEventListener('click', jump);
  canvas.addEventListener('touchend', (e) => { e.preventDefault(); jump(); }, { passive: false });

  loadAssets().then(() => {
    // set canvas size after assets loaded so bgW can be computed from image dimensions
    W = 0; H = 0; // force resize to apply
    resize();
    initGame();
    lastTime = performance.now();
    animId   = requestAnimationFrame(gameLoop);
  });
}

let resizeTimer;
window.addEventListener('resize', () => {
  if (!canvas || gameRunning) return; // don't resize during active play
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resize, 150);
});

function pressBtn(btn, onDone) {
  btn.classList.remove('pressing', 'attention');
  void btn.offsetWidth;
  btn.classList.add('pressing');

  let called = false;
  function proceed() {
    if (called) return; called = true;
    btn.classList.remove('pressing', 'attention');
    if (onDone) onDone();
  }

  // animationend で進む（iOS未発火のため 1800ms フォールバック）
  btn.addEventListener('animationend', function onPressEnd(e) {
    if (e.animationName !== 'go-btn-press') return;
    btn.removeEventListener('animationend', onPressEnd);
    btn.classList.remove('pressing');
    btn.classList.add('attention');
    btn.addEventListener('animationend', function onAttnEnd(e) {
      if (e.animationName.indexOf('glow') === -1) return;
      btn.removeEventListener('animationend', onAttnEnd);
      proceed();
    });
    setTimeout(proceed, 1500); // attention フォールバック
  });
  setTimeout(proceed, 1800); // press フォールバック
}

// ===== SHARE BUTTON =====
$('btn-share').addEventListener('click', function() {
  playShareSound();
  pressBtn(this, async () => {
    if (!navigator.share) { alert('このブラウザはシェア機能に対応していません'); return; }
    try {
      await navigator.share({
        title: 'EDF訓練',
        text: `【訓練①ランナー】SCORE: ${score}点 生存: ${Math.floor(elapsed)}秒 #EDF訓練 #TGS2026`
      });
    } catch(e) {}
  });
});

$('btn-retry').addEventListener('click', () => {
  playTypeClick();
  $('gameover-screen').style.display = 'none';
  onStartPress();
});

$('btn-hub').addEventListener('click', () => {
  playTypeClick();
  window.location.href = '/';
});
</script>
